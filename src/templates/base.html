<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dota Ranked{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-base-100 text-base-content">
  <nav class="navbar bg-base-200 px-6 shadow gap-4">
    <div class="navbar-start gap-1">
      <a href="/games" class="btn btn-ghost btn-sm {% if active_page == 'games' %}btn-active{% endif %}">Games</a>
      <a href="/players" class="btn btn-ghost btn-sm {% if active_page == 'players' %}btn-active{% endif %}">Players</a>
    </div>
    <div class="navbar-end">
      <form action="/player" method="get" class="flex gap-2">
        <input name="name" class="input input-sm input-bordered w-44" placeholder="Search player..." autocomplete="off" />
        <button type="submit" class="btn btn-sm btn-ghost">→</button>
      </form>
    </div>
  </nav>
  <main class="container mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
