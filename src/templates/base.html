<!DOCTYPE html>
<html lang="en" data-theme="ranked">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dota Ranked{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.19" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link href="/static/theme.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="min-h-screen bg-base-100 text-base-content app-shell">
  <nav class="navbar app-navbar px-6 gap-4">
    <div class="navbar-start gap-1">
      <a href="/games" class="btn btn-ghost btn-sm border {% if active_page == 'games' %}border-base-content/18 bg-base-300 text-base-content shadow-sm{% else %}border-transparent text-base-content/72{% endif %}">Games</a>
      <a href="/players" class="btn btn-ghost btn-sm border {% if active_page == 'players' %}border-base-content/18 bg-base-300 text-base-content shadow-sm{% else %}border-transparent text-base-content/72{% endif %}">Players</a>
      <a href="/dashboard" class="btn btn-ghost btn-sm border {% if active_page == 'dashboard' %}border-base-content/18 bg-base-300 text-base-content shadow-sm{% else %}border-transparent text-base-content/72{% endif %}">Dashboard</a>
    </div>
    <div class="navbar-end hidden sm:flex">
      <div x-data="{
        q: '',
        suggestions: [],
        open: false,
        active: -1,
        timer: null,
        async fetch() {
          if (this.q.length < 1) { this.suggestions = []; this.open = false; return; }
          clearTimeout(this.timer);
          this.timer = setTimeout(async () => {
            const res = await window.fetch('/api/suggest?q=' + encodeURIComponent(this.q));
            this.suggestions = await res.json();
            this.open = this.suggestions.length > 0;
            this.active = -1;
          }, 150);
        },
        pick(name) {
          window.location.href = '/player/' + encodeURIComponent(name);
        },
        onKey(e) {
          if (!this.open) return;
          if (e.key === 'ArrowDown') { e.preventDefault(); this.active = (this.active + 1) % this.suggestions.length; }
          else if (e.key === 'ArrowUp') { e.preventDefault(); this.active = (this.active - 1 + this.suggestions.length) % this.suggestions.length; }
          else if (e.key === 'Enter' && this.active >= 0) { e.preventDefault(); this.pick(this.suggestions[this.active]); }
          else if (e.key === 'Escape') { this.open = false; }
        }
      }" class="relative" @click.outside="open = false">
        <form action="/player" method="get" class="flex gap-2" @submit.prevent="q ? (active >= 0 ? pick(suggestions[active]) : pick(q)) : null">
          <input name="name" x-model="q" @input="fetch()" @keydown="onKey($event)"
            class="input input-sm w-44" placeholder="Search player..." autocomplete="off" />
          <button type="submit" class="btn btn-sm btn-ghost">→</button>
        </form>
        <ul x-show="open" x-cloak
          class="menu menu-sm absolute right-0 top-full z-50 mt-2 w-44 rounded-box border border-base-300 bg-base-200 p-1 shadow-lg">
          <template x-for="(name, i) in suggestions" :key="name">
            <li @click="pick(name)" @mouseenter="active = i"
              :class="active === i ? 'menu-active' : ''">
              <a class="truncate" x-text="name"></a>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
